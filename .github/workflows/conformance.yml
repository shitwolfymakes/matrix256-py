name: conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fixtures:
    name: Tier-1 fixtures (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out matrix256-py
        uses: actions/checkout@v4
        with:
          path: matrix256-py

      - name: Check out matrix256 spec repo
        uses: actions/checkout@v4
        with:
          repository: shitwolfymakes/matrix256
          path: matrix256

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Run synthetic fixture suite
        working-directory: matrix256-py
        run: python tests/generate_fixtures.py
